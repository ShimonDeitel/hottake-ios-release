name: HotTake
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  HotTake:
    type: application
    platform: iOS
    sources:
      - path: HotTake
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hottake
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: HotTake/Info.plist
        CODE_SIGN_ENTITLEMENTS: HotTake/HotTake.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HotTakeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HotTakeTests
      - path: HotTake.storekit
    dependencies:
      - target: HotTake
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hottake.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  HotTake:
    build:
      targets:
        HotTake: all
        HotTakeTests: [test]
    run:
      config: Debug
      storeKitConfiguration: HotTake.storekit
    test:
      config: Debug
      storeKitConfiguration: HotTake.storekit
      targets:
        - HotTakeTests
    archive:
      config: Release
